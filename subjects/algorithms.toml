name = "Algorithms"

# ── Time Complexity ──────────────────────────────────────────────────────

[[templates]]
id = "complexity-sorting"
question = "What is the worst-case time complexity of {{ algorithm }}?"
answer = "{{ algorithm }} has a worst-case complexity of {{ complexity }}. {{ explanation }}"

[templates.variables]
algorithm = ["Bubble Sort", "Selection Sort", "Insertion Sort", "Merge Sort", "Quick Sort", "Heap Sort"]
complexity = ["O(n²)", "O(n²)", "O(n²)", "O(n log n)", "O(n²)", "O(n log n)"]
explanation = [
    "It compares adjacent elements repeatedly.",
    "It scans for the minimum element in each pass.",
    "It shifts elements to insert each item in its correct position.",
    "It divides the array in half recursively and merges sorted halves.",
    "Poor pivot choices cause O(n²); average case is O(n log n).",
    "It builds a heap and repeatedly extracts the maximum element."
]

[[templates]]
id = "complexity-bst"
question = "What is the worst-case time complexity of a {{ operation }} in a {{ type }} BST?"
answer = "The worst-case complexity is {{ complexity }}. In a {{ type }} BST, {{ explanation }}"

[templates.variables]
operation = ["search", "insertion", "deletion"]
type = ["balanced", "unbalanced"]
complexity = ["O(log n)", "O(n)"]
explanation = [
    "the height is kept to O(log n) via rotations or balancing rules.",
    "the tree can degenerate into a linked list, making operations O(n)."
]

[[templates]]
id = "complexity-graph"
question = "What is the time complexity of {{ algorithm }} on a graph with V vertices and E edges?"
answer = "{{ algorithm }} runs in O({{ complexity }}). {{ explanation }}"

[templates.variables]
algorithm = ["Breadth-First Search (BFS)", "Depth-First Search (DFS)", "Dijkstra's algorithm", "Bellman-Ford algorithm", "Kruskal's algorithm", "Prim's algorithm"]
complexity = ["V + E", "V + E", "(V + E) log V", "V·E", "E log V", "(V + E) log V"]
explanation = [
    "Each vertex is visited once and each edge is traversed once.",
    "Each vertex is visited once and each edge is traversed once (using an adjacency list).",
    "Using a binary heap, each vertex is extracted once and each edge may relax the distance.",
    "It relaxes all edges V-1 times to detect negative cycles.",
    "Sorting edges takes E log E ≈ E log V, and union-find operations are nearly constant.",
    "Using a binary heap, each vertex is extracted once and each edge is considered."
]

# ── Divide and Conquer ───────────────────────────────────────────────────

[[templates]]
id = "d-and-c"
question = "Which of the following algorithms uses the divide-and-conquer paradigm?"
answer = "{{ algorithm }} uses divide-and-conquer. {{ explanation }}"

[templates.variables]
algorithm = ["Merge Sort", "Quick Sort", "Binary Search", "Strassen's matrix multiplication"]
explanation = [
    "It recursively divides the array in half, sorts each half, and merges them.",
    "It partitions the array around a pivot and recursively sorts each partition.",
    "It repeatedly divides the search interval in half.",
    "It recursively divides matrices into smaller submatrices."
]

[[templates]]
id = "d-and-c-not"
question = "Does {{ algorithm }} use divide-and-conquer?"
answer = "{{ yesno }}. {{ explanation }}"

[templates.variables]
algorithm = ["Dijkstra's algorithm", "Bellman-Ford", "Insertion Sort", "Selection Sort", "Breadth-First Search"]
yesno = ["No", "No", "No", "No", "No"]
explanation = [
    "It is a greedy algorithm, not divide-and-conquer.",
    "It uses dynamic programming (iterative relaxation).",
    "It is an incremental algorithm — it inserts elements one by one.",
    "It scans for the minimum repeatedly — no division step.",
    "It uses a queue for level-order traversal, not divide-and-conquer."
]

# ── Sorting Properties ───────────────────────────────────────────────────

[[templates]]
id = "sorting-property"
question = "Is {{ algorithm }} a stable sort?"
answer = "{{ yesno }}. {{ explanation }}"

[templates.variables]
algorithm = ["Bubble Sort", "Selection Sort", "Insertion Sort", "Merge Sort", "Quick Sort", "Heap Sort"]
yesno = ["Yes", "No", "Yes", "Yes", "No (typically)", "No"]
explanation = [
    "Equal elements are never swapped past each other.",
    "It selects the minimum and swaps it forward, potentially breaking stability.",
    "It inserts elements without reordering equal ones.",
    "When merging, equal elements from the left half come first.",
    "The partitioning step may reorder equal elements depending on the pivot strategy.",
    "It rearranges the array into a heap, which does not preserve relative order."
]

[[templates]]
id = "sorting-best-case"
question = "What is the best-case time complexity of {{ algorithm }}?"
answer = "{{ algorithm }} achieves O({{ complexity }}) in the best case. {{ explanation }}"

[templates.variables]
algorithm = ["Bubble Sort", "Insertion Sort", "Merge Sort", "Quick Sort", "Heap Sort"]
complexity = ["n", "n", "n log n", "n log n", "n log n"]
explanation = [
    "With an optimized version that stops early when no swaps occur.",
    "When the input is already sorted, it just compares each element once.",
    "Even in the best case, it must divide and merge recursively.",
    "With a good pivot strategy, it still requires O(n log n) comparisons.",
    "Building the heap takes O(n) and extracting all elements takes O(n log n)."
]

# ── Data Structures ──────────────────────────────────────────────────────

[[templates]]
id = "heap-property"
question = "In a {{ type }} heap, what property must every node satisfy?"
answer = "{{ explanation }}"

[templates.variables]
type = ["min-heap", "max-heap"]
explanation = [
    "Every parent node must have a value less than or equal to its children. The minimum element is at the root.",
    "Every parent node must have a value greater than or equal to its children. The maximum element is at the root."
]

[[templates]]
id = "hash-table"
question = "How does {{ method }} resolve collisions in a hash table?"
answer = "{{ explanation }}"

[templates.variables]
method = ["separate chaining", "linear probing", "quadratic probing", "double hashing"]
explanation = [
    "Each bucket stores a linked list (or another structure) of all keys that hash to that index.",
    "When a collision occurs, it checks the next available slot sequentially until an empty slot is found.",
    "When a collision occurs at index i, it checks i + 1², i + 2², i + 3², ... until an empty slot is found.",
    "When a collision occurs, a second hash function determines the step size for probing."

]

# ── Algorithm Design ─────────────────────────────────────────────────────

[[templates]]
id = "greedy-vs-dp"
question = "Is {{ algorithm }} greedy or dynamic programming?"
answer = "{{ paradigm }}. {{ explanation }}"

[templates.variables]
algorithm = ["Dijkstra's algorithm", "Bellman-Ford", "Huffman coding", "Knapsack (fractional)", "Knapsack (0/1)", "Floyd-Warshall"]
paradigm = ["Greedy", "Dynamic Programming", "Greedy", "Greedy", "Dynamic Programming", "Dynamic Programming"]
explanation = [
    "It always selects the unvisited vertex with the smallest distance — optimal substructure with a local choice.",
    "It relaxes all edges iteratively, building up optimal solutions to subproblems.",
    "It repeatedly combines the two lowest-frequency symbols — a locally optimal choice.",
    "It takes the item with the best value-to-weight ratio first.",
    "It considers whether to include or exclude each item, building a table of subproblem solutions.",
    "It considers each vertex as an intermediate node, updating shortest paths."
]

# ── Graph Properties ─────────────────────────────────────────────────────

[[templates]]
id = "graph-type"
question = "What is the main characteristic of a {{ type }} graph?"
answer = "{{ explanation }}"

[templates.variables]
type = ["directed", "undirected", "weighted", "acyclic", "complete", "bipartite"]
explanation = [
    "Edges have a direction — moving from vertex A to B does not imply a path from B to A.",
    "Edges have no direction — the relationship is symmetric.",
    "Each edge has a numerical value (weight) associated with it.",
    "The graph contains no cycles. A directed acyclic graph is called a DAG.",
    "Every pair of distinct vertices is connected by a unique edge.",
    "Vertices can be partitioned into two sets such that all edges go between the sets (no edges within a set)."
]
