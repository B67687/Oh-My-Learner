# ── SDLC Models ─────────────────────────────────────────────────────────────────
# Declarative: comparing process model characteristics is knowledge of facts.

[[templates]]
id = "sdlc-models"
type = "standard"
knowledge_type = "declarative"
question = "Compare the Waterfall, Agile (Scrum), and Spiral models. What are the key characteristics and appropriate use cases for each?"
answer = """Waterfall: linear sequential phases (requirements → design → implementation → verification → maintenance). Rigid, no backtracking. Best for well-understood projects with stable requirements (e.g., safety-critical systems).

Agile/Scrum: iterative with 1-4 week sprints, adaptive planning, continuous feedback, working software as progress metric. Best for projects with evolving requirements, small-to-medium teams.

Spiral: risk-driven, iterative refinement through quadrants (determine objectives → identify/resolve risks → develop/verify → plan next iteration). Each loop produces an increment. Best for large, high-risk, or experimental projects where risk analysis is critical."""

# ── Requirements Engineering ────────────────────────────────────────────────────
# Declarative: the distinction between functional and non-functional is definitional.

[[templates]]
id = "requirements-types"
type = "standard"
knowledge_type = "declarative"
question = "What is the difference between functional and non-functional requirements? Give two examples of each for an e-commerce checkout system."
answer = """Functional requirements describe WHAT the system must do — specific behaviours or functions:
- "The system shall calculate tax based on the customer's shipping address."
- "The system shall send a confirmation email after payment is processed."

Non-functional requirements describe HOW the system performs — constraints and quality attributes:
- "The checkout page shall load within 2 seconds under 1000 concurrent users." (performance)
- "All payment data shall be encrypted using TLS 1.3." (security)

Non-functional requirements are often cross-cutting and harder to verify, but are equally critical for system quality."""

# ── UML Class Diagram: Relationship Identification ─────────────────────────────
# Procedural: interpreting a description and mapping to the correct UML notation.

[[templates]]
id = "uml-class-relationship"
type = "code-trace"
knowledge_type = "procedural"
question = "A University has many Departments. Each Department has exactly one HeadOfDepartment, who is a Faculty member. A Faculty member may belong to zero or one Departments. A Course is taught by exactly one Faculty member, and a Faculty member may teach many Courses. Courses are composed of multiple Lectures and Tutorials, which cannot exist independently.\n\nIdentify the UML relationship types between: (a) University → Department, (b) Department → HeadOfDepartment, (c) Faculty → Course, (d) Course → Lecture."
answer = """(a) University ---<> Department: Association with aggregation (hollow diamond). A University contains Departments, but Departments can exist independently (the whole-part relationship is weak — University deleted does not necessarily destroy Departments in all interpretations). More precisely, a simple one-to-many association from University to Department is also defensible.

(b) Department ---|> HeadOfDepartment: This is NOT an inheritance relationship. HeadOfDepartment is a role played by a Faculty member — it's a one-to-one association, specifically a qualified association where Department has a "head" attribute of type Faculty.

(c) Faculty ---> Course: One-to-many association (1 Faculty teaches 0..* Courses). Directed if the navigation is one-way (Faculty knows its Courses); undirected if bidirectional.

(d) Course ---><> Lecture: Composition (filled diamond). Lectures are parts of a Course and cannot exist without it — destroying the Course destroys its Lectures."""

